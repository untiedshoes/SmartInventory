name: SmartInventory CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Test Full Stack
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # -----------------------
      # Backend
      # -----------------------
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Restore backend dependencies
        run: dotnet restore src/SmartInventory.Web

      - name: Build backend
        run: dotnet build --no-restore src/SmartInventory.Web

      - name: Run backend tests
        run: dotnet test --no-build --verbosity normal tests/SmartInventory.Tests

      # -----------------------
      # Frontend
      # -----------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Change to frontend directory
        run: cd src/SmartInventory.Web/ClientApp

      - name: Install frontend dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build