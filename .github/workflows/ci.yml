name: SmartInventory CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Test Full Stack
    runs-on: windows-latest

    steps:
      # -----------------------
      # Checkout code
      # -----------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------
      # Backend (ASP.NET)
      # -----------------------
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Restore backend dependencies
        run: dotnet restore src/SmartInventory.Web

      - name: Build backend
        run: dotnet build --no-restore src/SmartInventory.Web

      - name: Run backend tests
        run: dotnet test --no-build --verbosity normal tests/SmartInventory.Tests

      # -----------------------
      # Frontend (React)
      # -----------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install
        working-directory: smart-inventory-frontend

      #- name: Lint frontend (optional)
      #  run: npm run lint
      #  working-directory: smart-inventory-frontend

      - name: Build frontend
        run: npm run build
        working-directory: smart-inventory-frontend